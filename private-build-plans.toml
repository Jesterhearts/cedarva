[buildPlans.CedarvaMono]
family           = "Cedarva Mono"
spacing          = "normal"
serifs           = "sans"
noCvSs           = true
exportGlyphNames = false

[buildPlans.CedarvaMono.variants.design]
one                       = "no-base"
two                       = "straight-neck-serifless"
three                     = "flat-top-serifless"
four                      = "semi-open-serifless"
five                      = "oblique-flat-serifless"
six                       = "open-contour"
seven                     = "straight-serifless-crossbar"
